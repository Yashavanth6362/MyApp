          # ----- HARD‑CODED DEVICE TOKEN (replace with your own) -----
          DEVICE_TOKEN: "eNaBWG0SLNc:APA91bGOgsUHSlq_XqMZ_6QN8qdA775BUiBdBsR3jgtqE1RNIvffHHbO9fKYHGUxDWs5y-vNh4kjLokNfWcb0TYLqC27p5qRV9lPfRohSOM9M4NkV2kDI3U"

          # ----- Optional: Custom title and body -----
          TITLE: "GitHub Actions Notification"
          BODY: "This notification was sent from a GitHub Actions workflow!"

        run: |
          # ----------------------------------------------
          # 1. Generate JWT
          # ----------------------------------------------
          base64url() {
            openssl base64 -A | tr -d '=' | tr '/+' '_-'
          }

          NOW=$(date +%s)
          EXP=$((NOW + 3600))

          JWT_HEADER=$(echo -n '{"alg":"RS256","typ":"JWT"}' | base64url)
          JWT_PAYLOAD=$(echo -n '{
            "iss": "'"$CLIENT_EMAIL"'",
            "scope": "https://www.googleapis.com/auth/firebase.messaging",
            "aud": "https://oauth2.googleapis.com/token",
            "iat": '"$NOW"',
            "exp": '"$EXP"'
          }' | base64url)

          JWT_SIGNATURE_INPUT="$JWT_HEADER.$JWT_PAYLOAD"

          # Write private key to a temp file for signing
          echo "$PRIVATE_KEY" > /tmp/private-key.pem

          JWT_SIGNATURE=$(echo -n "$JWT_SIGNATURE_INPUT" | openssl dgst -sha256 -sign /tmp/private-key.pem -binary | base64url)
          rm -f /tmp/private-key.pem

          JWT="$JWT_SIGNATURE_INPUT.$JWT_SIGNATURE"

          # ----------------------------------------------
          # 2. Exchange JWT for OAuth2 access token
          # ----------------------------------------------
          ACCESS_TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$JWT")

          ACCESS_TOKEN=$(echo "$ACCESS_TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Failed to obtain access token"
            echo "Response: $ACCESS_TOKEN_RESPONSE"
            exit 1
          fi
          echo "✅ Obtained access token"

          # ----------------------------------------------
          # 3. Send FCM notification
          # ----------------------------------------------
          FCM_PAYLOAD='{
            "message": {
              "token": "'"$DEVICE_TOKEN"'",
              "notification": {
                "title": "'"$TITLE"'",
                "body": "'"$BODY"'"
              },
              "android": { "priority": "HIGH" }
            }
          }'

          FCM_RESPONSE=$(curl -s -X POST "https://fcm.googleapis.com/v1/projects/$PROJECT_ID/messages:send" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$FCM_PAYLOAD")

          if echo "$FCM_RESPONSE" | jq -e '.name' > /dev/null; then
            echo "✅ Notification sent successfully!"
            echo "Response: $FCM_RESPONSE"
          else
            echo "❌ Failed to send notification"
            echo "Error: $FCM_RESPONSE"
            exit 1
          fi