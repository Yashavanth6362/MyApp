name: Send FCM (Python + Worker JSON)

on:
  workflow_dispatch:
    inputs:
      token:
        description: 'Device token'
        required: true
      title:
        description: 'Notification title'
        default: 'Hello'
      body:
        description: 'Notification body'
        default: 'Test'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-auth requests

      - name: Fetch service account and send notification
        env:
          WORKER_URL: "https://project2.yashavanthan22.workers.dev/"
          TOKEN: ${{ github.event.inputs.token }}
          TITLE: ${{ github.event.inputs.title }}
          BODY: ${{ github.event.inputs.body }}
        run: |
          python3 - << 'EOF'
          import os, json, requests
          from google.oauth2 import service_account

          # 1. Fetch the service account JSON from the Worker
          worker_url = os.environ['WORKER_URL']
          resp = requests.get(worker_url)
          resp.raise_for_status()

          # 2. Fix the private key: replace escaped newlines with real ones
          #    The Worker sends the JSON with \n as a literal backslash-n.
          fixed_text = resp.text.replace('\\n', '\n')
          sa_info = json.loads(fixed_text)

          # 3. Create credentials and get an access token
          credentials = service_account.Credentials.from_service_account_info(
              sa_info,
              scopes=['https://www.googleapis.com/auth/firebase.messaging']
          )
          credentials.refresh(requests.Request())
          access_token = credentials.token

          # 4. Prepare the FCM payload
          payload = {
              "message": {
                  "token": os.environ['TOKEN'],
                  "notification": {
                      "title": os.environ['TITLE'],
                      "body": os.environ['BODY']
                  },
                  "android": {"priority": "HIGH"}
              }
          }

          # 5. Send the notification
          url = f"https://fcm.googleapis.com/v1/projects/{sa_info['project_id']}/messages:send"
          headers = {
              "Authorization": f"Bearer {access_token}",
              "Content-Type": "application/json"
          }
          response = requests.post(url, headers=headers, json=payload)
          response.raise_for_status()
          print("✅ Notification sent successfully!")
          print("Response:", response.json())
          EOF